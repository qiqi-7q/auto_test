- baseInfo:
    api_name: 智驾测试管理平台登录
    url: /api/auth/login
    method: post
    header:
      Content-Type: application/x-www-form-urlencoded;charset=UTF-8
  testCase:
    - case_name: 管理员登录并获取JWT令牌
      data:
        username: qq
        password: 123456
      validation:
        - contains: { 'message': '登录成功' }
      extract:
        access_token: $.data.access_token
